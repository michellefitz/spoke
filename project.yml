name: Spoke
options:
  bundleIdPrefix: com.michellefitzpatrick
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.michellefitzpatrick.Spoke
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_STRICT_CONCURRENCY: targeted

targets:
  Spoke:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Spoke
        excludes:
          - "Info.plist"
    info:
      path: Spoke/Info.plist
      properties:
        CFBundleDisplayName: Spoke
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSMicrophoneUsageDescription: "Spoke uses the microphone to capture your voice tasks."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.michellefitzpatrick.Spoke
        SWIFT_STRICT_CONCURRENCY: targeted
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies: []
    scheme:
      testTargets: []
